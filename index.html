<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book-a-Book</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', Arial, sans-serif; background: #f8f9fa; color: #202124; min-height: 100vh; }

    /* Header */
    header { background: #ffffff; border-bottom: 1px solid #e8eaed; padding: 14px 32px; display: flex; align-items: center; gap: 24px; }
    .header-brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .header-brand img { width: 32px; height: 32px; object-fit: contain; }
    .header-brand span { font-size: 20px; color: #5f6368; font-weight: 400; letter-spacing: -0.2px; }
    .toolbar { flex: 1; display: flex; align-items: center; gap: 12px; max-width: 720px; }
    .search-box { flex: 1; display: flex; align-items: center; gap: 10px; background: #f1f3f4; border-radius: 24px; padding: 0 16px; height: 44px; }
    .search-box svg { flex-shrink: 0; }
    .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 14px; font-family: inherit; color: #202124; }
    .search-box input::placeholder { color: #80868b; }
    .btn { height: 40px; padding: 0 20px; border-radius: 20px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .btn-add { border: 1px solid #dadce0; background: white; color: #1a73e8; }
    .btn-add:hover { background: #f6faff; border-color: #c9ddfc; }
    .btn-check { border: none; background: #1a73e8; color: white; }
    .btn-check:hover { background: #1765cc; }

    /* Error */
    .error-banner { background: #fce8e6; color: #c5221f; padding: 10px 32px; font-size: 13px; display: none; align-items: center; gap: 8px; }
    .error-banner.visible { display: flex; }

    /* Main */
    main { padding: 32px; }
    .empty { text-align: center; margin-top: 96px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .empty svg { color: #dadce0; }
    .empty p { color: #5f6368; font-size: 15px; }

    /* Table */
    .table-wrap { background: white; border-radius: 12px; box-shadow: 0 1px 2px rgba(60,64,67,0.15); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 14px 16px; text-align: left; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; color: #5f6368; border-bottom: 1px solid #e8eaed; }
    th:first-child, th:last-child { padding: 14px 0; }
    td { padding: 10px 16px; border-bottom: 1px solid #f1f3f4; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .book-cover { width: 36px; height: 52px; object-fit: cover; border-radius: 3px; display: block; }
    .book-title { font-weight: 500; font-size: 14px; }
    .book-title a { color: #202124; text-decoration: none; }
    .book-title a:hover { text-decoration: underline; color: #1a73e8; }
    .book-author { font-size: 13px; color: #5f6368; margin-top: 2px; }
    .book-note { font-size: 13px; color: #80868b; margin-top: 4px; font-style: italic; }
    .status-order { display: inline-block; background: #e6f4ea; color: #137333; padding: 5px 12px; border-radius: 14px; font-size: 13px; font-weight: 500; text-decoration: none; }
    .status-order:hover { background: #ceead6; }
    .status-reserve { display: inline-block; background: #fce8e6; color: #c5221f; padding: 5px 12px; border-radius: 14px; font-size: 13px; font-weight: 500; text-decoration: none; }
    .status-reserve:hover { background: #fad2ce; }
    .checking { opacity: 0.5; }

    /* Actions */
    .actions { display: flex; gap: 2px; align-items: center; }
    .btn-icon { background: none; border: none; color: #80868b; cursor: pointer; padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .btn-icon:hover { color: #202124; background: #f1f3f4; }
    .btn-icon.delete:hover { color: #c5221f; background: #fce8e6; }
    .confirm-delete { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #c5221f; white-space: nowrap; }
    .confirm-delete button { background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 500; padding: 3px 8px; border-radius: 4px; }
    .confirm-delete .yes { color: #c5221f; }
    .confirm-delete .yes:hover { background: #fce8e6; }
    .confirm-delete .no { color: #5f6368; }
    .confirm-delete .no:hover { background: #f1f3f4; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(32,33,36,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 12px; padding: 24px; width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.24); }
    .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
    .modal label { display: block; font-size: 12px; color: #5f6368; margin-bottom: 4px; margin-top: 14px; }
    .modal label:first-of-type { margin-top: 0; }
    .modal input[type="text"] { width: 100%; border: 1px solid #dadce0; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; outline: none; }
    .modal input[type="text"]:focus { border-color: #1a73e8; }
    .modal textarea { width: 100%; height: 90px; border: 1px solid #dadce0; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; outline: none; resize: vertical; }
    .modal textarea:focus { border-color: #1a73e8; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { background: none; color: #1a73e8; padding: 9px 16px; border: none; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-cancel:hover { background: #f6faff; }
    .btn-save { background: #1a73e8; color: white; padding: 9px 20px; border: none; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-save:hover { background: #1765cc; }
  </style>
</head>
<body>
  <header>
    <div class="header-brand">
      <img src="/icon.png" alt="">
      <span>Book-a-Book</span>
    </div>
    <div class="toolbar">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#5f6368" stroke-width="2"/><path d="M21 21L16.65 16.65" stroke="#5f6368" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" id="url-input" placeholder="Paste a catalog URL to add a book" />
      </div>
      <button class="btn btn-add" onclick="addBook()">Add book</button>
      <button class="btn btn-check" onclick="checkAll()">Check availability</button>
    </div>
  </header>

  <div class="error-banner" id="error-banner">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#c5221f" stroke-width="1.8"/><path d="M12 8V13" stroke="#c5221f" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="16" r="1" fill="#c5221f"/></svg>
    <span id="error-text"></span>
  </div>

  <main>
    <div class="empty" id="empty-msg">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M4 4.5C4 3.67 4.67 3 5.5 3H11V21H5.5C4.67 21 4 20.33 4 19.5V4.5Z" stroke="#dadce0" stroke-width="1.6" stroke-linejoin="round"/><path d="M20 4.5C20 3.67 19.33 3 18.5 3H13V21H18.5C19.33 21 20 20.33 20 19.5V4.5Z" stroke="#dadce0" stroke-width="1.6" stroke-linejoin="round"/></svg>
      <p>No books yet. Paste a catalog URL above to add one.</p>
    </div>
    <div class="table-wrap" id="books-table" style="display:none">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Book</th>
            <th>Manhattan</th>
            <th>Zaspa</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="books-body"></tbody>
      </table>
    </div>
  </main>

  <!-- Edit book modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h2>Edit book</h2>
      <label for="edit-title">Title</label>
      <input type="text" id="edit-title" />
      <label for="edit-author">Author</label>
      <input type="text" id="edit-author" />
      <label for="edit-note">Note</label>
      <textarea id="edit-note" placeholder="Add a note…"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
        <button class="btn-save" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let books = [];
    let availability = {};
    let editBookId = null;

    async function loadBooks() {
      try {
        const res = await fetch('/books');
        books = await res.json();
        render();
      } catch (e) {
        showError('Could not reach server');
      }
    }

    async function addBook() {
      const input = document.getElementById('url-input');
      const url = input.value.trim();
      if (!url) return;
      showError('');
      input.disabled = true;
      try {
        const res = await fetch('/books', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({url})
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Failed to add book'); return; }
        books = data;
        input.value = '';
        render();
      } catch (e) {
        showError('Could not reach server');
      } finally {
        input.disabled = false;
      }
    }

    function confirmDelete(id) {
      const cell = document.getElementById('actions-' + id);
      cell.innerHTML = `<div class="confirm-delete">Delete?
        <button class="yes" onclick="removeBook('${esc(id)}')">Yes</button>
        <button class="no" onclick="render()">No</button>
      </div>`;
    }

    async function removeBook(id) {
      try {
        const res = await fetch(`/books/${id}`, {method: 'DELETE'});
        if (!res.ok) { showError('Could not remove book'); return; }
        books = await res.json();
        delete availability[id];
        render();
      } catch (e) {
        showError('Could not reach server');
      }
    }

    async function checkAll() {
      showError('');
      document.getElementById('books-body').classList.add('checking');
      try {
        const res = await fetch('/check');
        if (!res.ok) { showError('Check failed'); return; }
        const results = await res.json();
        availability = {};
        results.forEach(r => { availability[r.id] = r; });
        render();
      } catch (e) {
        showError('Could not reach server');
      } finally {
        document.getElementById('books-body').classList.remove('checking');
      }
    }

    function openEdit(id) {
      const book = books.find(b => b.id === id);
      editBookId = id;
      document.getElementById('edit-title').value = book.title;
      document.getElementById('edit-author').value = book.author;
      document.getElementById('edit-note').value = book.note || '';
      document.getElementById('edit-modal').classList.add('open');
      document.getElementById('edit-title').focus();
    }

    function closeEdit() {
      editBookId = null;
      document.getElementById('edit-modal').classList.remove('open');
    }

    async function saveEdit() {
      const title = document.getElementById('edit-title').value.trim();
      const author = document.getElementById('edit-author').value.trim();
      const note = document.getElementById('edit-note').value.trim();
      if (!title) return;
      try {
        const res = await fetch(`/books/${editBookId}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({title, author, note})
        });
        if (!res.ok) { showError('Could not save changes'); return; }
        books = await res.json();
        closeEdit();
        render();
      } catch (e) {
        showError('Could not reach server');
      }
    }

    function lubimyczytacUrl(title) {
      return 'https://lubimyczytac.pl/szukaj/ksiazki?phrase=' + encodeURIComponent(title).replace(/%20/g, '+');
    }

    function render() {
      const empty = document.getElementById('empty-msg');
      const table = document.getElementById('books-table');
      const tbody = document.getElementById('books-body');
      if (books.length === 0) {
        empty.style.display = 'flex';
        table.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      table.style.display = 'block';
      tbody.innerHTML = books.map(book => {
        const avail = availability[book.id] || {};
        const note = book.note ? `<div class="book-note">${esc(book.note)}</div>` : '';
        return `<tr>
          <td><img class="book-cover" src="${esc(book.cover_url)}" alt="" onerror="this.style.display='none'"></td>
          <td>
            <div class="book-title"><a href="${esc(book.url)}" target="_blank">${esc(book.title)}</a></div>
            <div class="book-author">${esc(book.author)}</div>
            ${note}
          </td>
          <td>${statusBadge(avail.manhattan, book.url)}</td>
          <td>${statusBadge(avail.zaspa, book.url)}</td>
          <td id="actions-${esc(book.id)}">
            <div class="actions">
              <button class="btn-icon" onclick="openEdit('${esc(book.id)}')" title="Edit book">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M4 20L4.7 16.6L16.4 4.9C17.1 4.2 18.2 4.2 18.9 4.9L19.1 5.1C19.8 5.8 19.8 6.9 19.1 7.6L7.4 19.3L4 20Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M14.5 6.8L17.2 9.5" stroke="currentColor" stroke-width="1.6"/></svg>
              </button>
              <a class="btn-icon" href="${esc(lubimyczytacUrl(book.title))}" target="_blank" title="Search on Lubimyczytać">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.6"/><path d="M20 20L15.2 15.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
              </a>
              <button class="btn-icon delete" onclick="confirmDelete('${esc(book.id)}')" title="Delete">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 7H19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9 7V5C9 4.4 9.4 4 10 4H14C14.6 4 15 4.4 15 5V7" stroke="currentColor" stroke-width="1.6"/><path d="M7 7L7.8 19C7.9 19.6 8.4 20 9 20H15C15.6 20 16.1 19.6 16.2 19L17 7" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function statusBadge(status, url) {
      if (status === 'Order') return `<a class="status-order" href="${esc(url)}" target="_blank">Order</a>`;
      if (status === 'Reserve') return `<a class="status-reserve" href="${esc(url)}" target="_blank">Reserve</a>`;
      return '';
    }

    function showError(msg) {
      const banner = document.getElementById('error-banner');
      document.getElementById('error-text').textContent = msg;
      banner.classList.toggle('visible', !!msg);
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addBook();
    });

    document.getElementById('edit-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('edit-modal')) closeEdit();
    });

    loadBooks();
  </script>
</body>
</html>
